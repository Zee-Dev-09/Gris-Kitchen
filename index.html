<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"content="width=device-width,initial-scale=1.0"/>
    <title>Gris Kitchen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="main-container">
        <div class="navbar">
            <div class="brand">
                <img src="images/gris 2.png"class="gris">
                <p class="kitchen-text">Kitchen</p>
            </div>
            <img src="images/menu-bars.png"class="menu-bars">
            <div class="nav-link">
                <div class="home-link">Home</div>
                <div class="about-link">About Us</div>
                <div class="service-link">Our Service</div>
                <div class="contact-link">Contact Us</div>
            </div>
            <div class="instagram">
                <a href="https://www.instagram.com/gris_kitchens/" class="insta-text">Instagram</a>
                <img src="images/Insta-icon.png"class="insta-btn">
            </div>
        </div>
        <div class="hero-section">  
            <div class="dark-overlay">
                <div class="hero-text">
                    <p class="yummy-text">Yummy & Creative Meals</p>
                    <p class="delivered-text">Delivered with Love</p>
                </div>
                <p class="text">"From our kitchen to your table"</p>
                <small class="services-text"> Event Catering • Food Bowls • Awo Special & more</small>
                <div class="order-btn">Order Now!
                    <img src="images/Vector (2).png"class="order">
                </div>
            </div>
        </div>
    </div>

















































    <script src="script.js"></script>
</body>
</html>
